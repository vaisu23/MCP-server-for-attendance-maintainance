version: "3.9"

services:

  postgres:
    image: postgres:18

    container_name: attendance_postgres

    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql
      - ./app/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  mcp:
    build: .

    container_name: attendance_mcp

    depends_on:
      - postgres

    env_file:
      - .env.docker

    stdin_open: true
    tty: true

volumes:
  postgres_data: